<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Kỹ năng AI - Antigravity Factory (Tối giản & Light Mode)</title>
  <!-- Google Fonts: Plus Jakarta Sans cho UI, JetBrains Mono cho code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* LIGHT MODE DESIGN SYSTEM (Clean & Premium style like Linear / Vercel) */
    :root {
      --bg-base: #f9fafb;
      --bg-surface: #ffffff;
      --bg-surface-secondary: #f4f4f5;
      --border-color: #e4e4e7;
      --border-focus: #a1a1aa;
      
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #8e8e93;
      --text-bright: #09090b;
      
      --font-ui: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      --shadow-lg: 0 10px 30px -10px rgba(0, 0, 0, 0.06), 0 1px 3px 0 rgba(0, 0, 0, 0.02);
      
      --transition-smooth: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* BASE STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 40%),
        radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.03) 0px, transparent 40%);
      background-attachment: fixed;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }
    ::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1aa;
    }

    /* CONTAINER */
    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      width: 100%;
      flex-grow: 1;
    }

    header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
      margin-bottom: 1rem;
    }

    .logo-container svg {
      width: 26px;
      height: 26px;
      color: white;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text-bright);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* CONTROLS */
    .controls-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (min-width: 1024px) {
      .controls-panel {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .search-wrapper {
      position: relative;
      flex-grow: 1;
      width: 100%;
    }

    @media (min-width: 1024px) {
      .search-wrapper {
        max-width: 380px;
      }
    }

    .search-input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      transition: var(--transition-smooth);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--border-focus);
      background: var(--bg-surface);
      box-shadow: 0 0 0 2px rgba(9, 9, 11, 0.03);
    }

    .search-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .filter-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.825rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .filter-btn:hover {
      background: var(--bg-surface-secondary);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--text-bright);
      border-color: var(--text-bright);
      color: #ffffff;
    }

    .skills-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      background: var(--bg-surface-secondary);
      border: 1px solid var(--border-color);
      white-space: nowrap;
    }

    /* GRID OF CARDS */
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    @media (min-width: 640px) {
      .skills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .skills-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1440px) {
      .skills-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .skill-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: var(--transition-smooth);
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    .skill-card:hover {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .skill-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--theme-color, #71717a);
      border-radius: 14px 14px 0 0;
      opacity: 0.8;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.85rem;
      gap: 0.5rem;
    }

    .card-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--theme-color, var(--text-primary));
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
    }

    .category-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
      background: rgba(var(--theme-color-rgb), 0.08);
      color: var(--theme-color);
      border: 1px solid rgba(var(--theme-color-rgb), 0.15);
    }

    .card-body {
      flex-grow: 1;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    .card-subtitle {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .card-desc {
      font-size: 0.825rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border-color);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      border: 1px solid var(--border-color);
      gap: 0.35rem;
      flex-grow: 1;
      background: var(--bg-surface);
      color: var(--text-secondary);
    }

    .btn:hover {
      color: var(--text-primary);
      background: var(--bg-surface-secondary);
      border-color: var(--border-focus);
    }

    .btn svg {
      width: 12px;
      height: 12px;
    }

    /* TOAST SYSTEM */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: var(--text-bright);
      color: #ffffff;
      padding: 0.65rem 1.15rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      transition: opacity 0.2s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast svg {
      color: #10b981;
      width: 14px;
      height: 14px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2.5rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border-color);
      margin-top: auto;
    }
  </style>
</head>

        "id": "web-design-guidelines",
        "name": "web-design-guidelines",
        "title": "Web Design Guidelines",
        "category": "UI/UX & Design",
        "themeColor": "#e11d48",
        "themeColorRgb": "225, 29, 72",
        "icon": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`,
        "path": "e:/NextJS/job/job_from_system_vietadmin/system_dohy/.factory/skills/web-design-guidelines/SKILL.md",
        "description": "Các chỉ dẫn thiết kế web chuẩn mực về spacing, typography, colors và micro-animations."
      }
    ];

    let currentCategory = "All";
    let searchQuery = "";

    // Show Toast Notification
    function showToast(message) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14" height="14">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(5px)';
        setTimeout(() => toast.remove(), 250);
      }, 2000);
    }

    // Copy to clipboard helper
    function copyText(text, successMsg) {
      navigator.clipboard.writeText(text).then(() => {
        showToast(successMsg);
      }).catch(err => {
        console.error("Lỗi sao chép: ", err);
      });
    }

    // Initialize Category Filter Tabs
    function initFilters() {
      const categories = ["All", ...new Set(skillsData.map(s => s.category))];
      const tabsContainer = document.getElementById('filterTabs');
      
      tabsContainer.innerHTML = categories.map(cat => `
        <button class="filter-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">
          ${cat === 'All' ? 'Tất cả' : cat}
        </button>
      `).join('');
    }

    // Filter Category Click
    function filterCategory(category) {
      currentCategory = category;
      initFilters();
      renderCards();
    }

    // Search Input Handler
    function handleSearch() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      renderCards();
    }

    // Render Cards Grid
    function renderCards() {
      const grid = document.getElementById('skillsGrid');
      
      const filtered = skillsData.filter(skill => {
        const matchesCategory = currentCategory === "All" || skill.category === currentCategory;
        const matchesSearch = skill.name.toLowerCase().includes(searchQuery) || 
                              skill.title.toLowerCase().includes(searchQuery) ||
                              skill.description.toLowerCase().includes(searchQuery);
        return matchesCategory && matchesSearch;
      });

      document.getElementById('skillsCount').innerText = `Hiển thị: ${filtered.length}/${skillsData.length} skill`;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted);">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin: 0 auto 1rem; display: block; opacity: 0.5;">
              <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p style="font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--text-primary);">Không tìm thấy kết quả</p>
            <p style="font-size: 0.85rem; color: var(--text-secondary);">Hãy thử tìm kiếm với các từ khóa hoặc nhóm danh mục khác.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(skill => `
        <div class="skill-card" 
             style="--theme-color: ${skill.themeColor}; --theme-color-rgb: ${skill.themeColorRgb};">
          <div>
            <div class="card-header">
              <div class="card-icon">
                ${skill.icon}
              </div>
              <span class="category-badge">${skill.category}</span>
            </div>
            
            <div class="card-body">
              <h3 class="card-title">${skill.title}</h3>
              <p class="card-subtitle">${skill.name}</p>
              <p class="card-desc">${skill.description}</p>
            </div>
          </div>

          <div class="card-footer">
            <button class="btn" onclick="copyText('${skill.name}', 'Đã copy tên: ${skill.name}')" title="Copy tên định danh skill">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
              Copy tên
            </button>
            <button class="btn" onclick="copyText('${skill.path}', 'Đã copy đường dẫn file SKILL.md!')" title="Copy đường dẫn file SKILL.md">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
              Copy path IDE
            </button>
          </div>
        </div>
      `).join('');
    }

    // Run Init
    initFilters();
    renderCards();
  </script>
</body>
</html>
